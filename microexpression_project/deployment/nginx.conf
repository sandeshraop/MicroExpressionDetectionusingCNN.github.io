# Reverse proxy for micro-expression-api (HTTP only).
# For TLS, add a server { listen 443 ssl; ... } block and mount certs under deployment/ssl/.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log combined;
    sendfile on;
    tcp_nopush on;
    client_max_body_size 100m;

    upstream micro_expression_backend {
        server micro-expression-api:5000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://micro_expression_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
