version: '3.8'

services:
  microexpression-app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.improved
    container_name: microexpression-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/application.log
      - MAX_CONTENT_LENGTH=104857600  # 100MB
      - CORS_ORIGINS=*
      - UPLOAD_FOLDER=/app/uploads
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - MODEL_PATH=/app/models/real_data_model_20260414_085233.pkl
      - MAX_VIDEO_FRAMES=64
      - OPTICAL_FLOW_METHOD=farneback
      - MAX_CONCURRENT_REQUESTS=10
      - REQUEST_TIMEOUT=60
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - microexpression-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: microexpression-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - microexpression-network
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: microexpression-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ../web:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - microexpression-network
    depends_on:
      - microexpression-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local

networks:
  microexpression-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
